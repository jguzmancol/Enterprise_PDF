services:
  backend:
    build: ./backend
    volumes:
      - session_data:/tmp/sessions
    environment:
      - MAX_UPLOAD_MB=20
      - SESSION_TTL_MINUTES=5
    restart: unless-stopped
    networks:
      - jgfx-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - jgfx-net

volumes:
  session_data:

networks:
  jgfx-net:
    external: true
