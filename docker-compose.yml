services:
  backend:
    build: ./backend
    volumes:
      - session_data:/tmp/sessions
    environment:
      - MAX_UPLOAD_MB=100
      - SESSION_TTL_MINUTES=30
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  session_data:
